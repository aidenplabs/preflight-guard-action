name: "Preflight Guard"
description: "Run a narrow set of pre-launch red-flag checks for supported Next.js + Vercel / Supabase combinations."
inputs:
  path:
    description: "Repo path to scan."
    required: false
    default: "."
  output-dir:
    description: "Directory where Markdown and JSON reports should be written."
    required: false
    default: ".preflight-ci"
  fail-on:
    description: "Failure policy: caution, no, or never."
    required: false
    default: "no"
outputs:
  ship-recommendation:
    description: "Final ship recommendation from the JSON report."
    value: ${{ steps.preflight_outputs.outputs.ship_recommendation }}
  recommendation-summary:
    description: "Plain-language recommendation summary from the JSON report."
    value: ${{ steps.preflight_outputs.outputs.recommendation_summary }}
  stack-confidence:
    description: "Overall stack confidence from the JSON report."
    value: ${{ steps.preflight_outputs.outputs.stack_confidence }}
  profile-fit:
    description: "Profile fit from the JSON report."
    value: ${{ steps.preflight_outputs.outputs.profile_fit }}
  exit-code:
    description: "Scanner exit code after applying the selected fail-on policy."
    value: ${{ steps.run_preflight.outputs.exit_code }}
  recommendation-basis:
    description: "Recommendation basis from the JSON report."
    value: ${{ steps.preflight_outputs.outputs.recommendation_basis }}
  support-status:
    description: "Support status for the detected combination."
    value: ${{ steps.preflight_outputs.outputs.support_status }}
  combination:
    description: "Detected supported or review-only combination id."
    value: ${{ steps.preflight_outputs.outputs.combination }}
  json-report-path:
    description: "Path to the generated JSON report."
    value: ${{ steps.preflight_outputs.outputs.json_report_path }}
  markdown-report-path:
    description: "Path to the generated Markdown report."
    value: ${{ steps.preflight_outputs.outputs.markdown_report_path }}
runs:
  using: "composite"
  steps:
    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Build CLI
      shell: bash
      run: npm run build

    - name: Run preflight scanner
      id: run_preflight
      shell: bash
      run: |
        set +e
        mkdir -p "${{ inputs.output-dir }}"
        node dist/cli.js scan "${{ inputs.path }}" --output "${{ inputs.output-dir }}" --fail-on "${{ inputs.fail-on }}"
        CLI_EXIT=$?
        JSON_PATH="${{ inputs.output-dir }}/preflight-report.json"
        MARKDOWN_PATH="${{ inputs.output-dir }}/preflight-report.md"
        echo "json_path=$JSON_PATH" >> "$GITHUB_OUTPUT"
        echo "markdown_path=$MARKDOWN_PATH" >> "$GITHUB_OUTPUT"
        echo "exit_code=$CLI_EXIT" >> "$GITHUB_OUTPUT"
        exit $CLI_EXIT

    - name: Expose outputs
      if: always()
      id: preflight_outputs
      shell: bash
      run: |
        JSON_PATH="${{ steps.run_preflight.outputs.json_path }}"
        MARKDOWN_PATH="${{ steps.run_preflight.outputs.markdown_path }}"
        SHIP_RECOMMENDATION=$(node -e "const fs=require('fs');const p=process.argv[1];const d=JSON.parse(fs.readFileSync(p,'utf8'));process.stdout.write(d.shipRecommendation);" "$JSON_PATH")
        RECOMMENDATION_SUMMARY=$(node -e "const fs=require('fs');const p=process.argv[1];const d=JSON.parse(fs.readFileSync(p,'utf8'));process.stdout.write(d.recommendationSummary);" "$JSON_PATH")
        RECOMMENDATION_BASIS=$(node -e "const fs=require('fs');const p=process.argv[1];const d=JSON.parse(fs.readFileSync(p,'utf8'));process.stdout.write(d.recommendationBasis);" "$JSON_PATH")
        STACK_CONFIDENCE=$(node -e "const fs=require('fs');const p=process.argv[1];const d=JSON.parse(fs.readFileSync(p,'utf8'));process.stdout.write(d.stack.overallConfidence);" "$JSON_PATH")
        PROFILE_FIT=$(node -e "const fs=require('fs');const p=process.argv[1];const d=JSON.parse(fs.readFileSync(p,'utf8'));process.stdout.write(d.stack.profileFit);" "$JSON_PATH")
        SUPPORT_STATUS=$(node -e "const fs=require('fs');const p=process.argv[1];const d=JSON.parse(fs.readFileSync(p,'utf8'));process.stdout.write(d.stack.supportStatus);" "$JSON_PATH")
        COMBINATION=$(node -e "const fs=require('fs');const p=process.argv[1];const d=JSON.parse(fs.readFileSync(p,'utf8'));process.stdout.write(d.stack.combination);" "$JSON_PATH")
        echo "ship_recommendation=$SHIP_RECOMMENDATION" >> "$GITHUB_OUTPUT"
        echo "recommendation_summary=$RECOMMENDATION_SUMMARY" >> "$GITHUB_OUTPUT"
        echo "recommendation_basis=$RECOMMENDATION_BASIS" >> "$GITHUB_OUTPUT"
        echo "stack_confidence=$STACK_CONFIDENCE" >> "$GITHUB_OUTPUT"
        echo "profile_fit=$PROFILE_FIT" >> "$GITHUB_OUTPUT"
        echo "support_status=$SUPPORT_STATUS" >> "$GITHUB_OUTPUT"
        echo "combination=$COMBINATION" >> "$GITHUB_OUTPUT"
        echo "json_report_path=$JSON_PATH" >> "$GITHUB_OUTPUT"
        echo "markdown_report_path=$MARKDOWN_PATH" >> "$GITHUB_OUTPUT"
        if [ -n "$GITHUB_STEP_SUMMARY" ]; then
          {
            echo "## Preflight Summary"
            echo ""
            echo "- ship: \`$SHIP_RECOMMENDATION\`"
            echo "- summary: $RECOMMENDATION_SUMMARY"
            echo "- basis: \`$RECOMMENDATION_BASIS\`"
            echo "- combination: \`$COMBINATION\`"
            echo "- support status: \`$SUPPORT_STATUS\`"
            echo "- stack confidence: \`$STACK_CONFIDENCE\`"
            echo "- profile fit: \`$PROFILE_FIT\`"
            echo ""
            echo "Full reports stay in the generated Markdown and JSON files."
            echo "- markdown report: \`$MARKDOWN_PATH\`"
            echo "- json report: \`$JSON_PATH\`"
            echo ""
            echo "This summary is heuristic and decision-oriented. It is not proof that an app is safe."
          } >> "$GITHUB_STEP_SUMMARY"
        fi
